<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375px">
<title>FIXo · 01 · Splash</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0D0D0D;--white:#F5F2ED;--cream:#EDE9E1;--orange:#E8531A;--mid:#6B6560;}
body{width:375px;min-height:812px;background:var(--black);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;}
.status-time{font-weight:700;font-size:13px;color:var(--white);}
.status-dots{display:flex;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--white);opacity:.7;}
.content{flex:1;display:flex;flex-direction:column;justify-content:space-between;padding:32px 28px 48px;}
.logo{display:flex;align-items:baseline;}
.fix{font-family:'Syne',sans-serif;font-weight:800;font-size:80px;color:var(--white);letter-spacing:-0.03em;line-height:1;}
.o{font-family:'DM Serif Display',serif;font-style:italic;font-size:80px;color:var(--orange);letter-spacing:-0.03em;line-height:1;}
.tagline{font-family:'DM Serif Display',serif;font-style:italic;font-size:22px;color:rgba(245,242,237,0.45);line-height:1.3;margin-top:12px;}
.cta{display:flex;flex-direction:column;gap:10px;}
.btn-primary{background:var(--orange);color:white;border:none;border-radius:14px;padding:17px;font-family:'Syne',sans-serif;font-weight:700;font-size:16px;cursor:pointer;text-align:center;}
.btn-secondary{background:rgba(245,242,237,0.08);color:var(--white);border:.5px solid rgba(245,242,237,0.2);border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-weight:600;font-size:15px;cursor:pointer;text-align:center;}
.mono{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:rgba(245,242,237,.2);text-align:center;margin-top:8px;}
</style>
</head>
<body>
<div class="status">
  <span class="status-time">9:41</span>
  <div class="status-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div class="content">
  <div>
    <div class="logo"><span class="fix">FIX</span><span class="o">o</span></div>
    <div class="tagline">Tu casa siempre<br>en buenas manos.</div>
  </div>
  <div class="cta">
    <div class="btn-primary">Comenzar →</div>
    <div class="btn-secondary">Ya tengo cuenta</div>
    <div class="mono">Culiacán, Sinaloa · 2026</div>
  </div>
</div>
</body>
</html>
