<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=375px">
<title>FIXo · 04 · Registro</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0D0D0D;--white:#F5F2ED;--cream:#EDE9E1;--orange:#E8531A;--mid:#6B6560;--border:rgba(13,13,13,0.1);}
body{width:375px;min-height:812px;background:var(--white);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;}
.status-time{font-weight:700;font-size:13px;color:var(--black);}
.status-dots{display:flex;gap:5px;}
.dot{width:5px;height:5px;border-radius:50%;background:var(--black);opacity:.7;}
.content{flex:1;padding:12px 24px 40px;display:flex;flex-direction:column;}
.back{display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;color:var(--mid);margin-bottom:16px;}
.step-row{display:flex;align-items:center;gap:8px;margin-bottom:16px;}
.step-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--mid);}
.dots{display:flex;gap:5px;}
.sdot{height:4px;border-radius:2px;}
.sdot.done{background:var(--black);width:20px;}
.sdot.active{background:var(--orange);width:28px;}
.sdot.todo{background:var(--border);width:20px;}
.badge{display:inline-flex;align-items:center;gap:6px;background:var(--cream);border:.5px solid var(--border);border-radius:20px;padding:6px 12px;margin-bottom:16px;}
.badge-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);}
.badge-text{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--mid);}
.title{font-family:'Syne',sans-serif;font-weight:800;font-size:26px;color:var(--black);letter-spacing:-0.02em;line-height:1.2;margin-bottom:24px;}
.field-label{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:7px;}
.field{width:100%;background:var(--cream);border:.5px solid var(--border);border-radius:12px;padding:13px 16px;font-family:'Syne',sans-serif;font-size:14px;color:var(--black);margin-bottom:16px;}
.field.focused{border-color:var(--orange);}
.phone-row{display:flex;gap:8px;margin-bottom:16px;}
.prefix{background:var(--cream);border:.5px solid var(--border);border-radius:12px;padding:13px 14px;font-family:'Syne',sans-serif;font-size:14px;color:var(--mid);white-space:nowrap;}
.phone-input{flex:1;background:var(--cream);border:.5px solid var(--orange);border-radius:12px;padding:13px 16px;font-family:'Syne',sans-serif;font-size:14px;color:var(--black);}
.terms-row{display:flex;align-items:flex-start;gap:10px;margin-bottom:24px;}
.terms-check{width:18px;height:18px;border-radius:5px;border:1.5px solid var(--orange);background:rgba(232,83,26,0.1);flex-shrink:0;margin-top:1px;}
.terms-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--mid);line-height:1.6;letter-spacing:.04em;}
.terms-text span{color:var(--orange);}
.btn{width:100%;background:var(--orange);color:white;border:none;border-radius:14px;padding:16px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;text-align:center;}
</style>
</head>
<body>
<div class="status">
  <span class="status-time">9:41</span>
  <div class="status-dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
<div class="content">
  <div class="back">← Atrás</div>
  <div class="step-row">
    <span class="step-label">Paso 2 de 3</span>
    <div class="dots">
      <div class="sdot done"></div>
      <div class="sdot active"></div>
      <div class="sdot todo"></div>
    </div>
  </div>
  <div class="badge"><div class="badge-dot"></div><div class="badge-text">Propietario</div></div>
  <div class="title">Crea tu<br>cuenta.</div>
  <div class="field-label">Nombre completo</div>
  <div class="field">Julio Landa</div>
  <div class="field-label">Teléfono</div>
  <div class="phone-row">
    <div class="prefix">+52</div>
    <div class="phone-input focused">667 000 0000</div>
  </div>
  <div class="field-label">Correo electrónico</div>
  <div class="field" style="color:var(--mid);">julio@correo.com</div>
  <div class="terms-row">
    <div class="terms-check"></div>
    <div class="terms-text">Acepto los <span>Términos de servicio</span> y el <span>Aviso de privacidad</span> de FIXo.</div>
  </div>
  <div class="btn">Crear cuenta →</div>
</div>
</body>
</html>
