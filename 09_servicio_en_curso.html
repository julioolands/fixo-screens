<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=375px">
<title>FIXo · 09 · Servicio en Curso</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--black:#0D0D0D;--white:#F5F2ED;--cream:#EDE9E1;--orange:#E8531A;--mid:#6B6560;--border:rgba(13,13,13,0.1);}
body{width:375px;min-height:812px;background:var(--cream);font-family:'Syne',sans-serif;display:flex;flex-direction:column;}
.status{display:flex;justify-content:space-between;align-items:center;padding:14px 24px 6px;background:var(--cream);}
.status-time{font-weight:700;font-size:13px;color:var(--black);}
.sbd{display:flex;gap:5px;}.dot{width:5px;height:5px;border-radius:50%;background:var(--black);opacity:.7;}
.map-area{height:260px;background:#DDD9D0;position:relative;overflow:hidden;flex-shrink:0;}
.map-road{position:absolute;background:rgba(255,255,255,.5);}
.map-road.h{height:8px;left:0;right:0;}
.map-road.v{width:8px;top:0;bottom:0;}
.map-block{position:absolute;background:rgba(200,196,188,.6);border-radius:3px;}
.dest-pin{position:absolute;top:38%;left:52%;transform:translate(-50%,-100%);}
.tech-pin{position:absolute;top:56%;left:38%;transform:translate(-50%,-50%);}
.sheet{flex:1;background:var(--white);border-radius:24px 24px 0 0;margin-top:-20px;position:relative;z-index:2;padding:20px 22px 28px;display:flex;flex-direction:column;gap:14px;}
.eta-row{display:flex;align-items:center;justify-content:space-between;}
.eta-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:3px;}
.eta-time{font-family:'Syne',sans-serif;font-weight:800;font-size:30px;color:var(--black);letter-spacing:-.03em;line-height:1;}
.eta-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--orange);margin-top:3px;}
.eta-badge{background:var(--black);color:var(--white);font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;padding:8px 14px;border-radius:20px;}
.progress{height:4px;background:rgba(13,13,13,.08);border-radius:2px;overflow:hidden;}
.progress-fill{height:100%;background:var(--orange);border-radius:2px;width:65%;}
.tech-strip{background:var(--cream);border-radius:14px;padding:12px 14px;display:flex;align-items:center;gap:12px;}
.tav{width:42px;height:42px;border-radius:11px;background:var(--black);display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-weight:800;font-size:13px;color:var(--white);flex-shrink:0;}
.tinf{flex:1;}
.tnm{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;color:var(--black);}
.tsp{font-family:'DM Mono',monospace;font-size:10px;color:var(--mid);margin-top:1px;}
.tactions{display:flex;gap:8px;}
.tbtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;border:none;}
.tbtn-light{background:rgba(13,13,13,.08);}
.tbtn-dark{background:var(--black);}
.chat{background:var(--cream);border-radius:14px;padding:12px 14px;}
.chat-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--mid);margin-bottom:8px;}
.bubble{background:var(--white);border-radius:10px;padding:9px 12px;font-family:'Syne',sans-serif;font-size:12px;color:var(--black);margin-bottom:6px;border:.5px solid var(--border);}
.bubble.mine{background:var(--black);color:var(--white);text-align:right;}
.chat-time{font-family:'DM Mono',monospace;font-size:9px;color:var(--mid);text-align:right;}
.arrived-btn{width:100%;background:var(--orange);color:white;border:none;border-radius:14px;padding:15px;font-family:'Syne',sans-serif;font-weight:700;font-size:15px;text-align:center;}
</style>
</head>
<body>
<div class="status"><span class="status-time">9:41</span><div class="sbd"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>
<div class="map-area">
  <div class="map-road h" style="top:40%"></div>
  <div class="map-road h" style="top:65%"></div>
  <div class="map-road v" style="left:30%"></div>
  <div class="map-road v" style="left:60%"></div>
  <div class="map-block" style="top:15%;left:35%;width:60px;height:45px;"></div>
  <div class="map-block" style="top:15%;left:10%;width:40px;height:35px;"></div>
  <div class="map-block" style="top:70%;left:35%;width:50px;height:40px;"></div>
  <div class="map-block" style="top:70%;left:65%;width:55px;height:38px;"></div>
  <svg style="position:absolute;inset:0;width:100%;height:100%;" viewBox="0 0 375 260"><path d="M 142 145 Q 165 143 178 125 Q 188 110 190 95" stroke="#E8531A" stroke-width="3" fill="none" stroke-dasharray="6,4" opacity=".8"/></svg>
  <div class="dest-pin"><svg width="24" height="28" viewBox="0 0 24 28"><circle cx="12" cy="11" r="9" fill="#0D0D0D"/><circle cx="12" cy="11" r="4" fill="#F5F2ED"/></svg></div>
  <div class="tech-pin"><div style="width:32px;height:32px;background:#E8531A;border-radius:50%;border:3px solid white;display:flex;align-items:center;justify-content:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg></div></div>
</div>
<div class="sheet">
  <div class="eta-row">
    <div><div class="eta-lbl">Tiempo estimado</div><div class="eta-time">12 min</div><div class="eta-sub">Carlos en camino</div></div>
    <div class="eta-badge">En ruta</div>
  </div>
  <div class="progress"><div class="progress-fill"></div></div>
  <div class="tech-strip">
    <div class="tav">CM</div>
    <div class="tinf"><div class="tnm">Carlos Meza</div><div class="tsp">PLOMERÍA · ★ 4.9</div></div>
    <div class="tactions">
      <button class="tbtn tbtn-light"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#0D0D0D" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></button>
      <button class="tbtn tbtn-dark"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#F5F2ED" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81a19.79 19.79 0 01-3.07-8.67A2 2 0 012 .84h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 8.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg></button>
    </div>
  </div>
  <div class="chat">
    <div class="chat-lbl">Mensajes</div>
    <div class="bubble">Voy en camino, en unos minutos llego.</div>
    <div class="bubble mine">Ok, te espero. El problema está en el baño principal.</div>
    <div class="chat-time">9:38 am</div>
  </div>
  <div class="arrived-btn">Técnico llegó — Iniciar servicio →</div>
</div>
</body>
</html>
